services:
  postgres:
    image: postgres:16
    container_name: concord-postgres
    environment:
      POSTGRES_USER: concord
      POSTGRES_PASSWORD: concord
      POSTGRES_DB: concord
    ports:
      - "5432:5432"
    volumes:
      - concord-postgres-data:/var/lib/postgresql/data

volumes:
  concord-postgres-data:
