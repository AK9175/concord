<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Concord</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/base.css" />
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased">

  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-3xl items-center justify-between px-6 py-5">
      <div class="flex items-center gap-2.5">
        <div class="flex h-8 w-8 items-center justify-center rounded-lg bg-indigo-600 text-white font-semibold">C</div>
        <span class="text-lg font-semibold tracking-tight">Concord</span>
      </div>
      <div class="flex items-center gap-4">
        <a href="/docs.html" class="text-sm font-medium text-slate-500 hover:text-indigo-600">Docs</a>
        <button
          id="new-doc-button"
          class="inline-flex items-center gap-1.5 rounded-lg bg-indigo-600 px-3.5 py-2 text-sm font-medium text-white shadow-sm transition hover:bg-indigo-700 active:bg-indigo-800"
        >
          <span class="text-base leading-none">+</span> New document
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-3xl px-6 py-10">
    <h1 class="text-sm font-medium uppercase tracking-wide text-slate-400">Your documents</h1>

    <div id="doc-list" class="mt-4 divide-y divide-slate-200 rounded-xl border border-slate-200 bg-white shadow-sm">
      <!-- populated by landing.js -->
    </div>

    <p id="empty-state" class="mt-4 hidden text-sm text-slate-500">
      No documents yet &mdash; create one to get started.
    </p>

    <p id="error-banner" class="mt-4 hidden rounded-lg bg-red-50 px-4 py-3 text-sm text-red-700"></p>
  </main>

  <!-- Shared modal for both "new document" and "rename" -->
  <div id="doc-modal" class="fixed inset-0 z-10 hidden items-center justify-center bg-slate-900/40 px-6">
    <div class="w-full max-w-sm rounded-xl bg-white p-6 shadow-xl">
      <h2 id="doc-modal-title" class="text-base font-semibold">New document</h2>
      <form id="doc-modal-form" class="mt-4">
        <input
          id="doc-modal-input"
          type="text"
          placeholder="Untitled document"
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-100"
        />
        <div class="mt-5 flex justify-end gap-2">
          <button
            type="button"
            id="doc-modal-cancel"
            class="rounded-lg px-3.5 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100"
          >
            Cancel
          </button>
          <button
            type="submit"
            id="doc-modal-submit"
            class="rounded-lg bg-indigo-600 px-3.5 py-2 text-sm font-medium text-white hover:bg-indigo-700"
          >
            Create
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/js/landing.js"></script>
</body>
</html>
